name: Build Package

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # Allow manual triggers

permissions:
  contents: write  # Required to create releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit counting and tags

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release: use tag name (strip 'v' prefix)
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "release_name=v$VERSION" >> $GITHUB_OUTPUT
          else
            # Dev build: latest tag version + short commit hash
            # Get latest vX.Y.Z tag, or default to v0.0.0
            LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
            BASE_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
            SHORT_SHA=$(git rev-parse --short HEAD)

            VERSION="${BASE_VERSION}-${SHORT_SHA}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "release_name=prerelease" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        shell: pwsh
        run: ./build.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fed2-tools-${{ steps.version.outputs.version }}
          path: build/*.mpackage

      - name: Update prerelease
        if: steps.version.outputs.is_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prerelease
          name: Pre-release Build
          body: |
            Latest development build from main branch.

            **Build:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}

            This is an automated pre-release and may be unstable.
          prerelease: true
          files: build/*.mpackage
          # Replace existing dev release assets
          fail_on_unmatched_files: true

      - name: Generate release notes
        if: steps.version.outputs.is_release == 'true'
        id: release_notes
        run: |
          # Get the current tag
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          # Find the previous tag (exclude current)
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^prerelease$" | grep -v "^${CURRENT_TAG}$" | head -n1)

          if [ -z "$PREVIOUS_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --format='- %s' HEAD)
          else
            # Get commits between previous tag and current
            COMMITS=$(git log --format='- %s' "${PREVIOUS_TAG}..HEAD")
          fi

          # Store in output using heredoc for multiline
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tagged release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.release_name }}
          body: |
            ## fed2-tools ${{ steps.version.outputs.release_name }}

            ### Changes
            ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          files: build/*.mpackage
          fail_on_unmatched_files: true

      - name: Submit to Mudlet package repository
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.MUDLET_REPO_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          BRANCH="fed2-tools-v${VERSION}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the pre-forked repo (fork must exist at $OWNER/mudlet-package-repository)
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/mudlet-package-repository.git" \
            mudlet-repo

          cd mudlet-repo

          # Sync fork's main with upstream before branching to avoid merge conflicts
          gh repo sync "${OWNER}/mudlet-package-repository" \
            --source Mudlet/mudlet-package-repository \
            --branch main
          git pull origin main

          # Create a versioned branch so each release gets its own PR
          git checkout -b "$BRANCH"

          # Copy package using the canonical name (no version suffix in filename)
          cp "$GITHUB_WORKSPACE/build/fed2-tools.mpackage" "packages/fed2-tools.mpackage"

          git add "packages/fed2-tools.mpackage"
          git commit -m "Update fed2-tools to v${VERSION}"
          git push origin "$BRANCH"

          # Open a PR against the upstream Mudlet repo (skip if one already exists)
          EXISTING=$(gh pr list \
            --repo Mudlet/mudlet-package-repository \
            --head "${OWNER}:${BRANCH}" \
            --json number --jq 'length')

          if [ "$EXISTING" -eq 0 ]; then
            gh pr create \
              --repo Mudlet/mudlet-package-repository \
              --head "${OWNER}:${BRANCH}" \
              --base main \
              --title "Update fed2-tools to v${VERSION}" \
              --body "## fed2-tools v${VERSION}

          Automated submission from [${GITHUB_REPOSITORY}](https://github.com/${GITHUB_REPOSITORY}) release [v${VERSION}](https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}).

          **Description:** Federation 2 Community Edition tools collection for Mudlet."
          fi
